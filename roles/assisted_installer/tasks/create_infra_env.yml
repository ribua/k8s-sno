---
# Creates the infra-env linked to the cluster (required before network/ISO steps).
- name: Reuse existing infra-env when enabled
  ansible.builtin.include_tasks: lookup_infra_env.yml
  when: ai_reuse_existing_infra_env | default(true) | bool

- name: Refresh API token before infra-env creation
  ansible.builtin.include_tasks: authenticate.yml
  when: ai_infra_env_id is not defined

- name: Create infrastructure environment
  ansible.builtin.uri:
    url: "{{ ai_api_base }}/infra-envs"
    method: POST
    headers:
      Authorization: "Bearer {{ ai_api_token }}"
      Content-Type: application/json
    body_format: json
    body:
      name: "{{ ai_infra_env_name }}"
      cluster_id: "{{ ai_cluster_id }}"
      pull_secret: "{{ ai_pull_secret_string }}"
      cpu_architecture: "{{ cpu_architecture }}"
      openshift_version: "{{ openshift_version }}"
      image_type: "{{ ai_image_type }}"
      ssh_authorized_key: "{{ ai_ssh_public_key }}"
    status_code: 201
    return_content: true
  register: ai_infra_env_response
  when: ai_infra_env_id is not defined

- name: Save infra-env ID from new registration
  ansible.builtin.set_fact:
    ai_infra_env_id: "{{ ai_infra_env_response.json.id }}"
  when: ai_infra_env_id is not defined

- name: Show infra-env result
  ansible.builtin.debug:
    msg:
      - "Infra-env ID: {{ ai_infra_env_id }}"
      - "Cluster is now visible in the Hybrid Cloud Console wizard"

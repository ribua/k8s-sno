---
# Workflow mirrors the Assisted Installer UI wizard for SNO:
#   1. Cluster form (name, domain, version, 1 control plane)
#   2. Infra-env + static network + SSH key → discovery ISO
#   3. Download ISO

- name: Validate local prerequisites
  ansible.builtin.include_tasks: validate_prerequisites.yml

- name: Load Ansible Vault sealed secrets
  ansible.builtin.include_tasks: load_vault_secrets.yml

- name: Authenticate to Red Hat SSO
  ansible.builtin.include_tasks: authenticate.yml

- name: Load pull secret
  ansible.builtin.include_tasks: load_pull_secret.yml

- name: "UI step 1a — Use existing draft cluster"
  ansible.builtin.include_tasks: lookup_cluster.yml
  when: ai_use_existing_cluster | bool

- name: "UI step 1b — Create cluster definition"
  ansible.builtin.include_tasks: create_cluster.yml
  when: not (ai_use_existing_cluster | bool)

- name: "UI step 1c — Set cluster SSH key for install ignition"
  ansible.builtin.include_tasks: update_cluster_ssh.yml

- name: "UI step 2 — Create or reuse infra-env"
  ansible.builtin.include_tasks: create_infra_env.yml

- name: "UI step 3 — Configure network + SSH key on discovery image"
  ansible.builtin.include_tasks: update_infra_env_image.yml

- name: "UI step 4 — Download discovery ISO"
  ansible.builtin.include_tasks: download_iso.yml

- name: Save metadata artifact
  ansible.builtin.include_tasks: save_metadata.yml

---
# Workflow mirrors the Assisted Installer UI wizard for SNO:
#   1. Cluster form (name, domain, version, 1 control plane, single VIP)
#   2. Static network form (IP, DNS, subnet, gateway) → embedded in ISO
#   3. Operators (Local Storage Operator for StorageClass)
#   4. SSH public key + discovery image download

- name: Authenticate to Red Hat SSO
  ansible.builtin.include_tasks: authenticate.yml

- name: "UI step 1 — Create cluster definition"
  ansible.builtin.include_tasks: create_cluster.yml

- name: "UI step 2a — Create infra-env (links cluster to ISO generation)"
  ansible.builtin.include_tasks: create_infra_env.yml

- name: "UI step 2b — Configure static network on discovery image"
  ansible.builtin.include_tasks: configure_network.yml

- name: "UI step 3 — Operators (Local Storage) applied in create_cluster.yml"
  ansible.builtin.debug:
    msg: "Local Storage Operator (lso) requested at cluster creation for default SC"

- name: "UI step 4a — Add SSH key and regenerate discovery ISO"
  ansible.builtin.include_tasks: configure_ssh_and_iso.yml

- name: "UI step 4b — Download discovery ISO"
  ansible.builtin.include_tasks: download_iso.yml

- name: Save metadata artifact
  ansible.builtin.include_tasks: save_metadata.yml

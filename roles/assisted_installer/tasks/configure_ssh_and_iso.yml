---
# Mirrors Assisted Installer UI — form 4: SSH public key, then generate discovery image.
- name: Load SSH public key
  ansible.builtin.set_fact:
    ai_ssh_public_key: "{{ lookup('file', ai_ssh_public_key_file) }}"

- name: Refresh API token before discovery image generation
  ansible.builtin.include_tasks: authenticate.yml

- name: Add SSH key and regenerate discovery ISO
  ansible.builtin.uri:
    url: "{{ ai_api_base }}/infra-envs/{{ ai_infra_env_id }}"
    method: PATCH
    headers:
      Authorization: "Bearer {{ ai_api_token }}"
      Content-Type: application/json
    body_format: json
    body:
      pull_secret: "{{ ai_pull_secret }}"
      image_type: "{{ ai_image_type }}"
      ssh_authorized_key: "{{ ai_ssh_public_key }}"
    status_code: [200, 201]
    return_content: true
  register: ai_ssh_patch_response

- name: Show SSH key applied
  ansible.builtin.debug:
    msg:
      - "SSH public key embedded in discovery ISO"
      - "Key file: {{ ai_ssh_public_key_file }}"
      - "Image type: {{ ai_image_type }}"

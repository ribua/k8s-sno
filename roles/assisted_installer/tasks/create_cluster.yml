---
# Mirrors Assisted Installer UI — form 1: cluster name, base domain, version,
# control plane count (1 for SNO). For SNO, api_vips/ingress_vips are forbidden
# at cluster create — the node static IP + DNS handle api/apps (see update_infra_env_image.yml).
- name: Load pull secret from vaulted file
  ansible.builtin.include_tasks: load_pull_secret.yml

- name: Build cluster create request body with correct JSON types
  ansible.builtin.set_fact:
    ai_cluster_create_body: >-
      {{
        {
          'name': cluster_name,
          'openshift_version': openshift_version,
          'control_plane_count': control_plane_count | int,
          'base_dns_domain': base_domain,
          'cpu_architecture': cpu_architecture,
          'pull_secret': ai_pull_secret_string,
          'schedulable_masters': schedulable_masters | bool,
          'user_managed_networking': user_managed_networking | bool,
          'vip_dhcp_allocation': vip_dhcp_allocation | bool,
          'network_type': network_type,
          'platform': {'type': 'none'},
          'machine_networks': [{'cidr': machine_network_cidr}],
          'cluster_networks': [{
            'cidr': cluster_network_cidr,
            'host_prefix': cluster_network_host_prefix | int
          }],
          'service_networks': [{'cidr': service_network_cidr}],
          'olm_operators': ai_install_operators,
          'ssh_public_key': ai_ssh_public_key
        } | combine(
          {} if (control_plane_count | int) == 1 else {
            'api_vips': [{'ip': api_vip}],
            'ingress_vips': [{'ip': ingress_vip}]
          }
        )
      }}
  no_log: true

- name: Register or reuse SNO cluster draft
  ansible.builtin.include_tasks: register_cluster.yml

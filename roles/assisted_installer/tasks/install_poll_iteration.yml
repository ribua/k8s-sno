---
- name: Refresh API token during long install polling
  ansible.builtin.include_tasks: authenticate.yml
  when: (ai_poll_count | default(0) | int) % 20 == 0

- name: Increment poll counter
  ansible.builtin.set_fact:
    ai_poll_count: "{{ (ai_poll_count | default(0) | int) + 1 }}"

- name: Accept discovered host and bind to cluster
  ansible.builtin.include_tasks: accept_discovered_host.yml

- name: Ensure cluster SSH key is set before install
  ansible.builtin.include_tasks: update_cluster_ssh.yml
  when: not (ai_install_triggered | default(false) | bool)

- name: Fetch cluster status
  ansible.builtin.uri:
    url: "{{ ai_api_base }}/clusters/{{ ai_cluster_id }}"
    method: GET
    headers:
      Authorization: "Bearer {{ ai_api_token }}"
    status_code: 200
    return_content: true
  register: ai_cluster_status_response

- name: Fetch cluster hosts
  ansible.builtin.uri:
    url: "{{ ai_api_base }}/clusters/{{ ai_cluster_id }}/hosts?with-inventory=true"
    method: GET
    headers:
      Authorization: "Bearer {{ ai_api_token }}"
    status_code: 200
    return_content: true
  register: ai_cluster_hosts_response

- name: Set cluster facts for this poll
  ansible.builtin.set_fact:
    ai_cluster_status: "{{ ai_cluster_status_response.json.status }}"
    ai_cluster_status_info: "{{ ai_cluster_status_response.json.status_info | default('') }}"
    ai_cluster_hosts: >-
      {{
        ai_cluster_hosts_response.json
        if (ai_cluster_hosts_response.json | length) > 0
        else (ai_cluster_status_response.json.hosts | default([]))
      }}

- name: Reset matched cluster host
  ansible.builtin.set_fact:
    ai_sno_host: null

- name: Find SNO host on cluster by MAC
  ansible.builtin.set_fact:
    ai_sno_host: "{{ item }}"
  loop: "{{ ai_cluster_hosts }}"
  when: >-
    ai_sno_host is none
    and item.inventory is defined
    and (
      item.inventory.interfaces | default([])
      | map(attribute='mac_address')
      | map('lower')
      | map('regex_replace', '[:-]', '')
      | list
      | select('equalto', ai_sno_mac_normalized)
      | list
      | length > 0
    )
  loop_control:
    label: "{{ item.id | default('host') }}"

- name: Use single cluster host when SNO has one host (already bound)
  ansible.builtin.set_fact:
    ai_sno_host: "{{ ai_cluster_hosts | first }}"
  when:
    - ai_sno_host is none
    - ai_cluster_hosts | length == 1

- name: Use infra-env host when not yet visible on cluster
  ansible.builtin.set_fact:
    ai_sno_host: "{{ ai_infra_env_sno_host }}"
  when:
    - ai_sno_host is none
    - ai_infra_env_sno_host is mapping
    - ai_infra_env_sno_host.id is defined

- name: Trigger cluster install when cluster is ready
  ansible.builtin.uri:
    url: "{{ ai_api_base }}/clusters/{{ ai_cluster_id }}/actions/install"
    method: POST
    headers:
      Authorization: "Bearer {{ ai_api_token }}"
    status_code: [202, 409]
    return_content: true
  register: ai_install_trigger_response
  when:
    - ai_auto_trigger_install | bool
    - not (ai_install_triggered | default(false) | bool)
    - ai_cluster_status in ai_install_statuses_ready_for_install
    - ai_cluster_hosts | length > 0

- name: Mark install as triggered
  ansible.builtin.set_fact:
    ai_install_triggered: true
  when: >-
    ai_install_trigger_response is not skipped
    and ai_install_trigger_response.status | default(0) in [202, 409]

- name: Mark install as triggered when cluster already installing
  ansible.builtin.set_fact:
    ai_install_triggered: true
  when: ai_cluster_status in ai_install_active_statuses

- name: Report install progress
  ansible.builtin.debug:
    msg:
      - "Poll {{ ai_poll_iteration }}/{{ ai_install_max_polls }} — cluster: {{ ai_cluster_status }} ({{ ai_cluster_status_info }})"
      - >-
        Host: {{ ai_sno_host.requested_hostname | default(ai_sno_host.id | default('waiting')) if ai_sno_host is mapping else 'not discovered yet' }},
        status={{ ai_sno_host.status | default('n/a') if ai_sno_host is mapping else 'n/a' }},
        role={{ ai_sno_host.role | default('n/a') if ai_sno_host is mapping else 'n/a' }},
        cluster_hosts={{ ai_cluster_hosts | length }}
      - "Install triggered: {{ ai_install_triggered | default(false) }}"

- name: Fail when Assisted Installer reports cluster error
  ansible.builtin.fail:
    msg: >-
      Cluster {{ cluster_name }} entered status '{{ ai_cluster_status }}':
      {{ ai_cluster_status_info }}
  when: ai_cluster_status in ai_install_terminal_failure

- name: Set install completion flag
  ansible.builtin.set_fact:
    ai_install_complete: true
  when: ai_cluster_status == ai_install_terminal_success

- name: Sleep until next poll
  ansible.builtin.wait_for:
    timeout: "{{ ai_install_poll_interval | int }}"
  delegate_to: localhost
  when: not (ai_install_complete | default(false) | bool)

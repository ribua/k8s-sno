---
- name: Verify vaulted credentials file exists
  ansible.builtin.stat:
    path: "{{ ai_secrets_vault_file }}"
  register: ai_vault_stat

- name: Fail if vaulted credentials file is missing
  ansible.builtin.fail:
    msg: >-
      Missing {{ ai_secrets_vault_file }}.
      Setup: cp secrets/vault.yml.example secrets/vault.plain.yml,
      set rh_offline_token, cp pull secret to secrets/pull-secret.plain.json,
      then run: ./scripts/seal-secrets.sh
  when: not ai_vault_stat.stat.exists

- name: Load vaulted credentials (offline token)
  ansible.builtin.include_vars:
    file: "{{ ai_secrets_vault_file }}"
  no_log: true

- name: Validate offline token was loaded from vault
  ansible.builtin.assert:
    that:
      - rh_offline_token is defined
      - rh_offline_token | length > 0
    fail_msg: >-
      rh_offline_token not found in {{ ai_secrets_vault_file }}.
      Edit secrets/vault.plain.yml and re-run ./scripts/seal-secrets.sh

- name: Validate SSH public key was loaded from vault
  ansible.builtin.assert:
    that:
      - rh_ssh_public_key is defined
      - rh_ssh_public_key | trim | length > 0
      - rh_ssh_public_key is match('^ssh-(rsa|ed25519|ecdsa) ')
    fail_msg: >-
      rh_ssh_public_key not found or invalid in {{ ai_secrets_vault_file }}.
      Add bastion/installer SSH public key and re-run ./scripts/seal-secrets.sh

- name: Set SSH public key fact for Assisted Installer API
  ansible.builtin.set_fact:
    ai_ssh_public_key: "{{ rh_ssh_public_key | trim }}"
  no_log: true

- name: Verify vaulted pull secret file exists
  ansible.builtin.stat:
    path: "{{ ai_pull_secret_file }}"
  register: ai_pull_secret_stat

- name: Fail if vaulted pull secret file is missing
  ansible.builtin.fail:
    msg: >-
      Missing {{ ai_pull_secret_file }}.
      Place pull secret at secrets/pull-secret.plain.json and run ./scripts/seal-secrets.sh
  when: not ai_pull_secret_stat.stat.exists

- name: Verify pull secret file is Ansible Vault encrypted
  ansible.builtin.command:
    cmd: "head -1 {{ ai_pull_secret_file }}"
  register: ai_pull_secret_header
  changed_when: false

- name: Fail if pull secret is not vault-encrypted
  ansible.builtin.fail:
    msg: >-
      {{ ai_pull_secret_file }} is not vault-encrypted.
      Run ./scripts/seal-secrets.sh to encrypt it.
  when: "'$ANSIBLE_VAULT' not in ai_pull_secret_header.stdout"

---
# Step 1: cluster draft + discovery ISO (network + SSH key embedded in ISO).
#
# Fresh rebuild: delete old draft in cloud.redhat.com first.
# Confirm rh_ssh_public_key in vault matches your private key (e.g. ~/.ssh/id.bastion.pub).
#
# Run:
#   ansible-playbook playbooks/create-cluster-and-iso.yml --vault-password-file .vault_pass
- name: Create Assisted Installer SNO cluster and download discovery ISO
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
  roles:
    - role: assisted_installer
